name: Build Android App (Signed APK & AAB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync/Repair Android Platform
        run: |
          echo "Checking Android platform integrity..."
          if [ -d "android" ] && ( [ ! -f "android/build.gradle" ] || [ ! -f "android/settings.gradle" ] ); then
            echo "⚠️ Android folder exists but is corrupted (missing gradle files). Initiating repair..."
            mkdir -p temp_backup/app/src/main/res/xml
            [ -f "android/app/src/main/AndroidManifest.xml" ] && cp "android/app/src/main/AndroidManifest.xml" "temp_backup/app/src/main/"
            [ -f "android/app/src/main/res/xml/network_security_config.xml" ] && cp "android/app/src/main/res/xml/network_security_config.xml" "temp_backup/app/src/main/res/xml/"
            [ -f "android/app/src/main/res/xml/data_extraction_rules.xml" ] && cp "android/app/src/main/res/xml/data_extraction_rules.xml" "temp_backup/app/src/main/res/xml/"
            [ -f "android/app/src/main/res/xml/file_paths.xml" ] && cp "android/app/src/main/res/xml/file_paths.xml" "temp_backup/app/src/main/res/xml/"
            rm -rf android
            npx cap add android
            [ -f "temp_backup/app/src/main/AndroidManifest.xml" ] && cp "temp_backup/app/src/main/AndroidManifest.xml" "android/app/src/main/"
            [ -f "temp_backup/app/src/main/res/xml/network_security_config.xml" ] && cp "temp_backup/app/src/main/res/xml/network_security_config.xml" "android/app/src/main/res/xml/"
            [ -f "temp_backup/app/src/main/res/xml/data_extraction_rules.xml" ] && cp "temp_backup/app/src/main/res/xml/data_extraction_rules.xml" "android/app/src/main/res/xml/"
            [ -f "temp_backup/app/src/main/res/xml/file_paths.xml" ] && cp "temp_backup/app/src/main/res/xml/file_paths.xml" "android/app/src/main/res/xml/"
            rm -rf temp_backup
            echo "✅ Android platform repaired successfully."
          elif [ ! -d "android" ]; then
            echo "Android folder missing. Adding platform..."
            npx cap add android
          else
            echo "Android platform appears valid."
          fi
          echo "Syncing Capacitor..."
          npx cap sync android

      - name: Force API 35
        run: |
          echo "💉 Injecting API 35..."
          if [ -f "android/variables.gradle" ]; then
            sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 35/g' android/variables.gradle
            sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 35/g' android/variables.gradle
          fi
          echo "✅ API updated to 35!"

      # 👈 اللقاح المضاد لتضارب المكتبات (تمت زراعته هنا)
      - name: Force Stable AndroidX Globally (Fix API 36 Conflict)
        run: |
          echo "💉 Injecting global resolution strategy for all plugins..."
          cat <<EOF >> android/build.gradle

          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'androidx.activity:activity:1.9.3'
                      force 'androidx.core:core:1.15.0'
                      force 'androidx.core:core-ktx:1.15.0'
                  }
              }
          }
          EOF
          echo "✅ Stable AndroidX versions enforced globally!"

      - name: Smart Auto-Update google-services.json
        run: |
          echo "💉 Extracting exact package name from app..."
          APP_ID=$(grep 'applicationId' android/app/build.gradle | awk -F '"' '{print $2}')
          echo "Detected Package Name: $APP_ID"
          
          mkdir -p android/app
          rm -f android/app/google-services.json
          
          echo '{
            "project_info": { "project_number": "123456789012", "project_id": "dummy-project", "storage_bucket": "dummy-project.appspot.com" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:123456789012:android:321abc456def7890", "android_client_info": { "package_name": "'"$APP_ID"'" } }, "oauth_client": [], "api_key": [ { "current_key": "AIzaSyDummyKey" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }' > android/app/google-services.json
          echo "✅ Match successful!"

      - name: Generate App Icons
        run: npx capacitor-assets generate --android

      # 👈 التعديل الجراحي: بناء النسختين معاً مع مراعاة السكربت الخاص بك
      - name: Build Android Release (APK & AAB)
        run: |
          cd android
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease bundleRelease --stacktrace
          else
            echo "Gradlew missing. Falling back to system Gradle..."
            gradle assembleRelease bundleRelease --stacktrace
          fi

      # 👈 التوقيع الجراحي لنسخة هواوي (APK)
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      # 👈 التوقيع الجراحي لنسخة جوجل (AAB)
      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      # 👈 تسليم نسخة هواوي لأولياء الأمور
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Parents-Signed-APK
          path: ${{steps.sign_apk.outputs.signedReleaseFile}}

      # 👈 تسليم نسخة جوجل لأولياء الأمور
      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Parents-Signed-AAB
          path: ${{steps.sign_aab.outputs.signedReleaseFile}}
