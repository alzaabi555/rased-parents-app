name: Build Android APK 🚀

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 جلب الكود المصدري
        uses: actions/checkout@v4

      - name: 🟢 إعداد بيئة Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت الحزم (npm install)
        run: npm install

      - name: 🏗️ بناء واجهة التطبيق (Vite Build)
        run: npm run build

      - name: 🔄 مزامنة الكود مع الأندرويد (Capacitor Sync)
        run: npx cap sync android

      - name: ☕ إعداد بيئة Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔑 إعطاء صلاحيات التشغيل لمُجمّع الأندرويد
        run: chmod +x ./android/gradlew

      - name: 🔨 بناء تطبيق الأندرويد (APK)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: 🎁 حفظ ورفع ملف التطبيق النهائي
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Parents-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
