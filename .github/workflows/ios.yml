name: Build iOS App (Unsigned IPA for SideStore)

on:
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Project
        run: npm run build
        
      - name: 🍏 Generate iOS Project (Capacitor 8 SPM)
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          
      - name: 🚀 Build IPA
        run: |
          cd ios/App
          
          # 🪄 تم البناء بنجاح! الآن نأمره بوضع الملف في مجلد build
          xcodebuild -project App.xcodeproj -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO SYMROOT=$PWD/build build
          
          # تجميع التطبيق إلى صيغة IPA
          mkdir -p Payload
          cp -r build/Debug-iphoneos/App.app Payload/
          zip -r ../../Rased-Parent.ipa Payload
    
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Parent-IPA
          path: rased-parent.ipa
