name: Build iOS App (Unsigned IPA for SideStore)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Setup & Build iOS Platform
        run: |
          echo "🧹 1. Cleaning up old iOS folder..."
          rm -rf ios
          
          echo "🔍 2. Matching Capacitor Version..."
          CAP_VERSION=$(npx cap --version)
          echo "Detected Capacitor Version: $CAP_VERSION"
          npm install @capacitor/ios@$CAP_VERSION
          
          echo "🍏 3. Adding iOS Platform from scratch..."
          npx cap add ios
          
          echo "🔄 4. Syncing & Installing Pods..."
          npx cap sync ios
          
          echo "📂 5. Verifying workspace exists..."
          ls -la ios/App

      - name: Build iOS App (Unsigned for SideStore)
        run: |
          echo "🔨 Building iOS App via xcodebuild..."
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

      - name: Package into IPA
        run: |
          echo "🎁 Packaging .app into .ipa format..."
          mkdir -p Payload
          mv ios/App/build/Release-iphoneos/App.app Payload/
          zip -r rased-parent.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Parent-IPA
          path: rased-parent.ipa
