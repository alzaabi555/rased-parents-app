name: Build iOS App (Unsigned IPA for SideStore)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies & Build
        run: |
          echo "📦 Installing project packages..."
          npm install
          echo "🏗️ Building web assets..."
          npm run build

      - name: The Ultimate iOS Repair & Sync
        run: |
          echo "🧹 1. Hard reset iOS platform..."
          rm -rf ios
          
          echo "📥 2. Reinstalling Capacitor iOS..."
          npm install @capacitor/ios --save
          
          echo "🍏 3. Generating iOS platform..."
          npx cap add ios
          
          echo "🔍 4. Enforcing Podfile existence..."
          if [ ! -f "ios/App/Podfile" ]; then
            echo "⚠️ Podfile is missing! Injecting the default Capacitor Podfile forcibly..."
            mkdir -p ios/App
            cp node_modules/@capacitor/ios/assets/Podfile ios/App/Podfile
          else
            echo "✅ Podfile found normally."
          fi
          
          echo "🔄 5. Syncing Capacitor Plugins..."
          npx cap sync ios

      - name: Force CocoaPods Workspace
        run: |
          echo "⚙️ Running explicit pod install..."
          cd ios/App
          pod install --repo-update

      - name: Build iOS App via Xcode
        run: |
          echo "🔨 Compiling App..."
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

      - name: Package into IPA
        run: |
          echo "🎁 Zipping into IPA format..."
          mkdir -p Payload
          mv ios/App/build/Release-iphoneos/App.app Payload/
          zip -r rased-parent.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Parent-IPA
          path: rased-parent.ipa
